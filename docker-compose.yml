version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: modulocrud_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./BD.txt:/docker-entrypoint-initdb.d/BD.txt:ro  # Inicializa la BD automáticamente
    networks:
      - crud_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: modulocrud_backend
    restart: always
    ports:
      - "127.0.0.1:3001:3000"  # Puerto 3001 en host → 3000 interno (evita conflicto en VPS compartido)
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=3000  # Puerto interno del contenedor Node.js (sin cambios)
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crud_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}   # Inyecta la URL de la API en el build de React
    container_name: modulocrud_frontend
    restart: always
    ports:
      - "127.0.0.1:8893:80"  # Solo accesible por Nginx en el host (Puerto 8893)
    networks:
      - crud_network

volumes:
  db_data:
    name: modulocrud_db_data  # Nombre explícito para no confundir con otros proyectos

networks:
  crud_network:
    driver: bridge
