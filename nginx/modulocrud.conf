server {
    listen 80;
    server_name modulocrud.slscode.online;

    # Redirigir todo el tráfico HTTP a HTTPS (Certbot agregará el bloque 443 automáticamente)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name modulocrud.slscode.online;

    # Certbot completará estas líneas automáticamente al ejecutar:
    # sudo certbot --nginx -d modulocrud.slscode.online
    # ssl_certificate ...
    # ssl_certificate_key ...

    # ── Frontend (PWA - React compilada en contenedor puerto 8893) ──
    location / {
        proxy_pass http://127.0.0.1:8893;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Backend (API Node.js en contenedor puerto 3000) ──
    # Todas las rutas que empiecen por /api se redirigen al backend
    location /api {
        proxy_pass http://127.0.0.1:8894;  # Puerto 8894 (backend Node.js)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Soporte CORS para la PWA
        add_header 'Access-Control-Allow-Origin' 'https://modulocrud.slscode.online' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
    }
}
